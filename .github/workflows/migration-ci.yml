name: Migration CI

# Triggers: any push, plus PRs targeting main.
# Path filter so this only runs when migration-related backend files (or this workflow) change.
on:
  push:
    branches: ['**']
    paths:
      - 'backend/src/migration/**'
      - 'backend/src/entity/**'
      - 'backend/src/db/**'
      - 'backend/package*.json'
      - '.github/workflows/migration-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/src/migration/**'
      - 'backend/src/entity/**'
      - 'backend/src/db/**'
      - 'backend/package*.json'
      - '.github/workflows/migration-ci.yml'

jobs:
  migration-check:
    name: Migration check (migration:show)
    # When the self-hosted NixOS runner is ready, swap to: runs-on: [self-hosted, nixos]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run migration:show
